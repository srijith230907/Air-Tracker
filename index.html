<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis AR Physics Engine</title>
    <style>
        body, html {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #050510; /* Darker sci-fi background */
            font-family: 'Courier New', Courier, monospace; /* HUD Font */
        }

        .mirrored { transform: scaleX(-1); }

        #camera-feed {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover; z-index: 0;
            opacity: 0.6; /* Dim the camera for hologram effect */
            filter: grayscale(30%) contrast(120%);
        }

        #physics-canvas {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh; z-index: 1;
            pointer-events: none;
        }

        #ui-overlay {
            position: absolute; top: 20px; left: 20px; z-index: 2;
            background: rgba(0, 20, 40, 0.8);
            border: 1px solid #00f3ff;
            box-shadow: 0 0 10px #00f3ff;
            color: #00f3ff;
            padding: 20px;
            border-radius: 5px;
            text-transform: uppercase;
        }

        h3 { margin-top: 0; border-bottom: 1px solid #00f3ff; padding-bottom: 10px; }
        .instruction { font-size: 13px; margin: 8px 0; }
        .color-indicator { 
            display: inline-block; width: 15px; height: 15px; 
            border-radius: 50%; vertical-align: middle;
            box-shadow: 0 0 8px currentColor;
        }
    </style>

    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <!-- Matter.js Physics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <video id="camera-feed" class="mirrored" autoplay playsinline></video>
    <canvas id="physics-canvas" class="mirrored"></canvas>

    <div id="ui-overlay">
        <h3>J.A.R.V.I.S. AR Interface</h3>
        <div class="instruction">☝️ <b>Index Up:</b> Construct Object (Static)</div>
        <div class="instruction">🖐️ <b>Open Hand:</b> Drop & Interact (Physics)</div>
        <div class="instruction">✊ <b>Fist:</b> Purge Canvas (Erase)</div>
        <div class="instruction">🤏 <b>Pinch:</b> Cycle Material Color</div>
        <hr style="border-color: #00f3ff44;">
        <div class="instruction">Material: <span id="color-box" class="color-indicator" style="background-color: #ff3b30;"></span></div>
        <div class="instruction">System: <span id="status-text" style="color: #fff;">Calibrating Optics...</span></div>
    </div>

    <script>
        // --- 1. Setup Matter.js Physics ---
        const Engine = Matter.Engine,
              Render = Matter.Render,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Composite = Matter.Composite,
              Body = Matter.Body;

        const engine = Engine.create();
        const world = engine.world;
        engine.gravity.y = 0; // Starts floating

        const canvas = document.getElementById('physics-canvas');
        const render = Render.create({
            canvas: canvas,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: 'transparent'
            }
        });

        // The Floor
        const floor = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 50, window.innerWidth, 100, { isStatic: true });
        Composite.add(world, floor);

        // JARVIS HAND COLLIDERS (5 fingertips + 1 palm)
        const handColliders = [];
        const holoColor = 'rgba(0, 243, 255, 0.4)'; // Cyan holographic color
        
        for (let i = 0; i < 6; i++) {
            // Palm is index 5 (make it larger), fingers are 0-4
            const size = (i === 5) ? 45 : 20; 
            const collider = Bodies.circle(-1000, -1000, size, { 
                isStatic: true, // They act as solid walls to the ink
                render: { fillStyle: holoColor, strokeStyle: '#00f3ff', lineWidth: 2 }
            });
            handColliders.push(collider);
            Composite.add(world, collider);
        }

        Render.run(render);
        Runner.run(Runner.create(), engine);

        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
            Body.setPosition(floor, { x: window.innerWidth / 2, y: window.innerHeight + 50 });
        });

        // --- 2. App State Variables ---
        let inkParticles = [];
        const colors = ['#ff3b30', '#34c759', '#007aff', '#ffcc00', '#af52de', '#ffffff'];
        let colorIndex = 0;
        let lastPinchTime = 0;
        const statusText = document.getElementById('status-text');
        const colorBox = document.getElementById('color-box');

        // --- 3. Setup MediaPipe Hands ---
        const videoElement = document.getElementById('camera-feed');
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        function isFingerUp(landmarks, tipIndex, pipIndex) {
            return landmarks[tipIndex].y < landmarks[pipIndex].y;
        }

        function getDistance(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }

        hands.onResults((results) => {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                // Hide holographic colliders if hand is off screen
                handColliders.forEach(c => Body.setPosition(c, { x: -1000, y: -1000 }));
                return;
            }

            const landmarks = results.multiHandLandmarks[0];

            // Determine finger states
            const indexUp = isFingerUp(landmarks, 8, 6);
            const middleUp = isFingerUp(landmarks, 12, 10);
            const ringUp = isFingerUp(landmarks, 16, 14);
            const pinkyUp = isFingerUp(landmarks, 20, 18);
            const pinchDist = getDistance(landmarks[4], landmarks[8]);

            // Gestures
            const isPinch = pinchDist < 0.05;
            const isFist = !indexUp && !middleUp && !ringUp && !pinkyUp;
            const isOpenHand = indexUp && middleUp && ringUp && pinkyUp;
            const isDrawing = indexUp && !middleUp && !ringUp && !pinkyUp;

            const now = Date.now();

            // Screen mapping (mirrored handled by CSS)
            const mapX = (normX) => normX * window.innerWidth;
            const mapY = (normY) => normY * window.innerHeight;

            // ACTION 1: PINCH (Change Color)
            if (isPinch && now - lastPinchTime > 500) {
                colorIndex = (colorIndex + 1) % colors.length;
                colorBox.style.backgroundColor = colors[colorIndex];
                statusText.innerText = "Color Updated";
                lastPinchTime = now;
            }
            
            // ACTION 2: FIST (Erase Canvas)
            else if (isFist) {
                statusText.innerText = "Purging Canvas...";
                inkParticles.forEach(p => Composite.remove(world, p));
                inkParticles = [];
                handColliders.forEach(c => Body.setPosition(c, { x: -1000, y: -1000 })); // Hide hands
            }

            // ACTION 3: INDEX UP (Constructing/Drawing)
            else if (isDrawing) {
                statusText.innerText = "Constructing Object...";
                handColliders.forEach(c => Body.setPosition(c, { x: -1000, y: -1000 })); // Hide colliders while drawing
                
                const ink = Bodies.circle(mapX(landmarks[8].x), mapY(landmarks[8].y), 15, {
                    isStatic: true, // Floats exactly where you draw it
                    restitution: 0.8, // Bouncy!
                    render: { fillStyle: colors[colorIndex] }
                });
                
                inkParticles.push(ink);
                Composite.add(world, ink);
            }

            // ACTION 4: OPEN HAND (Drop & Play)
            else if (isOpenHand) {
                statusText.innerText = "Physics Activated";
                
                // 1. Turn on gravity and un-freeze drawings
                engine.gravity.y = 1; 
                inkParticles.forEach(p => {
                    if (p.isStatic) Body.setStatic(p, false);
                });

                // 2. Map Holographic physics colliders to your actual fingers
                // Landmarks: 4(Thumb), 8(Index), 12(Middle), 16(Ring), 20(Pinky), 9(Palm center)
                const points = [4, 8, 12, 16, 20, 9]; 
                
                points.forEach((lmIndex, i) => {
                    Body.setPosition(handColliders[i], {
                        x: mapX(landmarks[lmIndex].x), 
                        y: mapY(landmarks[lmIndex].y)
                    });
                });
            } 
            
            // Default: Hide colliders if gesture is unrecognized
            else {
                handColliders.forEach(c => Body.setPosition(c, { x: -1000, y: -1000 }));
                statusText.innerText = "Standby...";
            }
        });

        // --- 4. Start Webcam ---
        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        
        camera.start()
            .then(() => { statusText.innerText = "System Online"; })
            .catch(err => { statusText.innerText = "Camera Access Denied"; });
    </script>
</body>
</html>
