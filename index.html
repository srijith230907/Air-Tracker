<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Tracker: Dual-Hand Spatial Engine</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #020208; font-family: 'Courier New', Courier, monospace; }
        
        #camera-feed {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: 0; opacity: 0.35; transform: scaleX(-1);
        }
        
        #canvas3d { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        #ui-overlay {
            position: absolute; top: 20px; left: 20px; z-index: 2;
            background: rgba(0, 10, 25, 0.85); border: 1px solid #00f3ff;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4); color: #00f3ff; padding: 20px;
            border-radius: 6px; text-transform: uppercase; letter-spacing: 1px;
        }
        
        h3 { margin-top: 0; border-bottom: 1px solid #00f3ff; padding-bottom: 10px; font-size: 16px; }
        .instruction { font-size: 12px; margin: 8px 0; color: #a5f3fc; }
        .color-indicator { 
            display: inline-block; width: 14px; height: 14px; 
            border-radius: 50%; vertical-align: middle; box-shadow: 0 0 8px currentColor;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <video id="camera-feed" autoplay playsinline></video>
    <div id="canvas3d"></div>

    <div id="ui-overlay">
        <h3>Air Tracker Symmetric Node</h3>
        <div class="instruction">☝️ <b>Index Up:</b> Draw Shape (Independent)</div>
        <div class="instruction">✊ <b>Fist:</b> Tactile Hand Eraser (Wipe Space)</div>
        <div class="instruction">🖐️ <b>Open Hand:</b> Shatter into 3D Blocks</div>
        <div class="instruction">🤙 <b>Pinky Up:</b> Undo Last Object</div>
        <div class="instruction">🤏 <b>Pinch:</b> Rotate Material Color</div>
        <hr style="border-color: #00f3ff44;">
        <div class="instruction">Active Color: <span id="color-box" class="color-indicator" style="background-color: #00f3ff;"></span></div>
        <div class="instruction">System Array: <span id="status-text" style="color: #fff;">Mapping Spatial Matrix...</span></div>
    </div>

    <script>
        // --- 1. Three.js 3D Environment Setup ---
        const container = document.getElementById('canvas3d');
        const scene = new THREE.Scene();
        
        const camera3d = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera3d.position.set(0, 0, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // --- 2. State & Physics Control Arrays ---
        let physicalObjects = [];
        let objectHistory = [];
        const colors = [0x00f3ff, 0xff0055, 0x00ff66, 0xffcc00, 0xb026ff, 0xffffff];
        let colorIndex = 0;
        let lastActionTime = 0;

        const statusText = document.getElementById('status-text');
        const colorBox = document.getElementById('color-box');

        // Track independent drawing streams for Hand 0 and Hand 1
        let handTrackingData = [
            { isDrawing: false, strokePoints: [], liveLineMesh: null },
            { isDrawing: false, strokePoints: [], liveLineMesh: null }
        ];

        // 10 Glow nodes for tracking 5 fingers on up to 2 hands simultaneously
        const handTrackers = [];
        const trackerGeo = new THREE.SphereGeometry(0.06, 16, 16);
        
        for(let i=0; i<10; i++) {
            const trackerMat = new THREE.MeshBasicMaterial({ color: 0x00f3ff, wireframe: true });
            const mesh = new THREE.Mesh(trackerGeo, trackerMat);
            mesh.visible = false;
            scene.add(mesh);
            handTrackers.push(mesh);
        }

        // Live Line Render Logic for Active Paths
        function updateLiveLine(handIdx) {
            const data = handTrackingData[handIdx];
            if (data.liveLineMesh) scene.remove(data.liveLineMesh);
            if (data.strokePoints.length < 2) return;

            const geometry = new THREE.BufferGeometry().setFromPoints(data.strokePoints);
            const material = new THREE.LineBasicMaterial({ color: colors[colorIndex], linewidth: 4 });
            data.liveLineMesh = new THREE.Line(geometry, material);
            scene.add(data.liveLineMesh);
        }

        // --- 3. Intelligent Shape Generation Engine ---
        function computeAndBuild3DShape(points) {
            if (points.length < 5) return;

            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity, minZ = Infinity, maxZ = -Infinity;
            points.forEach(p => {
                if(p.x < minX) minX = p.x; if(p.x > maxX) maxX = p.x;
                if(p.y < minY) minY = p.y; if(p.y > maxY) maxY = p.y;
                if(p.z < minZ) minZ = p.z; if(p.z > maxZ) maxZ = p.z;
            });

            const w = maxX - minX;
            const h = maxY - minY;
            const d = maxZ - minZ;
            const center = new THREE.Vector3(minX + w/2, minY + h/2, minZ + d/2);

            const start = points[0];
            const end = points[points.length - 1];
            const isClosedLoop = start.distanceTo(end) < (w + h) * 0.3;

            let geometry, material, mesh;
            material = new THREE.MeshStandardMaterial({ color: colors[colorIndex], roughness: 0.2, metalness: 0.5 });
            let type = 'freeform';

            if (isClosedLoop) {
                const aspect = w / h;
                if (aspect > 0.75 && aspect < 1.3) {
                    const radius = (w + h) / 4;
                    geometry = new THREE.SphereGeometry(radius, 32, 32);
                    mesh = new THREE.Mesh(geometry, material);
                    mesh.position.copy(center);
                    type = 'sphere';
                    mesh.userData = { type, radius };
                    statusText.innerText = "Sphere Created";
                } else {
                    geometry = new THREE.BoxGeometry(w, h, Math.max(0.2, (w+h)/4));
                    mesh = new THREE.Mesh(geometry, material);
                    mesh.position.copy(center);
                    type = 'box';
                    mesh.userData = { type, w, h, d: Math.max(0.2, (w+h)/4) };
                    statusText.innerText = "Box Created";
                }
            } else {
                if (w / h > 3.5 || h / w > 3.5) {
                    const length = start.distanceTo(end);
                    geometry = new THREE.CylinderGeometry(0.08, 0.08, length, 16);
                    mesh = new THREE.Mesh(geometry, material);
                    mesh.position.copy(center);
                    const dir = new THREE.Vector3().subVectors(end, start).normalize();
                    mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
                    type = 'cylinder';
                    mesh.userData = { type, length, dir: dir.clone() };
                    statusText.innerText = "Cylinder Beam Created";
                } else {
                    const group = new THREE.Group();
                    const segmentGeo = new THREE.SphereGeometry(0.07, 8, 8);
                    for(let i=0; i<points.length; i+=2) {
                        let segMesh = new THREE.Mesh(segmentGeo, material.clone());
                        segMesh.position.copy(points[i]);
                        group.add(segMesh);
                    }
                    mesh = group;
                    type = 'freeform';
                    mesh.userData = { type };
                    statusText.innerText = "Ribbon Network Created";
                }
            }

            mesh.userData.velocity = new THREE.Vector3(0, 0, 0);
            mesh.userData.isStatic = true;

            scene.add(mesh);
            physicalObjects.push(mesh);
            objectHistory.push([mesh]);
        }

        // --- 4. Core 3D Physics Loop ---
        const clock = new THREE.Clock();
        
        function animatePhysicsEngine() {
            requestAnimationFrame(animatePhysicsEngine);
            const dt = Math.min(0.03, clock.getDelta());
            
            for (let i = physicalObjects.length - 1; i >= 0; i--) {
                const obj = physicalObjects[i];
                if (obj.userData.isStatic) continue;

                obj.userData.velocity.y -= 9.8 * dt;
                obj.position.addScaledVector(obj.userData.velocity, dt);

                if(obj.userData.rotSpeed) {
                    obj.rotation.x += obj.userData.rotSpeed.x * dt;
                    obj.rotation.y += obj.userData.rotSpeed.y * dt;
                }

                // Floor Boundaries
                if (obj.position.y < -2.4) {
                    obj.position.y = -2.4;
                    obj.userData.velocity.y *= -0.35; // Bounce absorption
                    obj.userData.velocity.x *= 0.85; // Friction resistance
                    obj.userData.velocity.z *= 0.85;
                }

                // Interactive hand collisions (pushes blocks forward/away)
                handTrackers.forEach(tracker => {
                    if(!tracker.visible || tracker.userData.isEraserMode) return;
                    let dist = obj.position.distanceTo(tracker.position);
                    if(dist < 0.25) {
                        let pushDir = new THREE.Vector3().subVectors(obj.position, tracker.position).normalize();
                        obj.userData.velocity.addScaledVector(pushDir, 3.5);
                    }
                });
            }
            renderer.render(scene, camera3d);
        }
        animatePhysicsEngine();

        // --- 5. MediaPipe Dual-Hand Processing Architecture ---
        const videoElement = document.getElementById('camera-feed');
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.65,
            minTrackingConfidence: 0.65
        });

        function checkFingerUp(lm, tip, pip) { return lm[tip].y < lm[pip].y; }
        function lerp(start, end, amt) { return (1 - amt) * start + amt * end; }

        hands.onResults((results) => {
            // Deactivate all visibility tags at initialization frame boundary
            handTrackers.forEach(t => { t.visible = false; t.userData.isEraserMode = false; t.material.color.setHex(0x00f3ff); });

            // Maintain reference flags across hands
            let universalState = { pinch: false, undo: false };

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                results.multiHandLandmarks.forEach((lm, handIdx) => {
                    if (handIdx >= 2) return; // Cap loop structural lookups safely at two hands

                    const iUp = checkFingerUp(lm, 8, 6), mUp = checkFingerUp(lm, 12, 10), rUp = checkFingerUp(lm, 16, 14), pUp = checkFingerUp(lm, 20, 18);
                    const pinchDist = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);

                    // Compute consistent spatial tracking depth configurations
                    const spatialZ = lerp(-1, -4, (lm[0].z + 0.1) * 5); 
                    const spatialX = (lm[8].x - 0.5) * -6.5; 
                    const spatialY = (0.5 - lm[8].y) * 4.5;

                    const isDraw = iUp && !mUp && !rUp && !pUp;
                    const isShatter = iUp && mUp && rUp && pUp;
                    const isEraser = !iUp && !mUp && !rUp && !pUp; // Fist gesture ✊
                    
                    if (pUp && !iUp && !mUp && !rUp) universalState.undo = true;
                    if (pinchDist < 0.045 && !mUp) universalState.pinch = true;

                    // Update standard finger tracking markers
                    const fingerIndices = [4, 8, 12, 16, 20];
                    fingerIndices.forEach((fId, fIdx) => {
                        let trackerIndex = (handIdx * 5) + fIdx;
                        if(trackerIndex < handTrackers.length) {
                            let node = handTrackers[trackerIndex];
                            node.position.set((lm[fId].x - 0.5) * -6.5, (0.5 - lm[fId].y) * 4.5, spatialZ);
                            node.visible = true;
                            
                            // If this specific hand is a fist, mark its nodes as active erasers
                            if (isEraser) {
                                node.userData.isEraserMode = true;
                                node.material.color.setHex(0xff0055); // Crimson warning outline for eraser mode
                            }
                        }
                    });

                    // --- Action Processing per Independent Hand ---
                    if (isDraw) {
                        let data = handTrackingData[handIdx];
                        if (!data.isDrawing) { data.isDrawing = true; data.strokePoints = []; }
                        data.strokePoints.push(new THREE.Vector3(spatialX, spatialY, spatialZ));
                        statusText.innerText = `Hand [${handIdx + 1}] Structuring...`;
                        updateLiveLine(handIdx);
                    } else {
                        let data = handTrackingData[handIdx];
                        if (data.isDrawing) {
                            data.isDrawing = false;
                            computeAndBuild3DShape(data.strokePoints);
                            data.strokePoints = [];
                            updateLiveLine(handIdx);
                        }

                        if (isEraser) {
                            statusText.innerText = `Hand [${handIdx + 1}] Eraser Active`;
                            const palmX = (lm[9].x - 0.5) * -6.5;
                            const palmY = (0.5 - lm[9].y) * 4.5;
                            const palmZ = spatialZ;
                            const eraseRadius = 0.45; // Physical cleanup bounding reach

                            // Direct structural cleanup checking
                            for (let k = physicalObjects.length - 1; k >= 0; k--) {
                                let obj = physicalObjects[k];
                                let pos = new THREE.Vector3();
                                if (obj.getWorldPosition) obj.getWorldPosition(pos);
                                else pos.copy(obj.position);

                                if (pos.distanceTo(new THREE.Vector3(palmX, palmY, palmZ)) < eraseRadius) {
                                    scene.remove(obj);
                                    physicalObjects.splice(k, 1);
                                }
                            }
                        }
                        else if (isShatter) {
                            statusText.innerText = "Shatter Field Discharged";
                            let targets = physicalObjects.filter(obj => obj.userData.isStatic);

                            targets.forEach(parentObj => {
                                scene.remove(parentObj);
                                physicalObjects = physicalObjects.filter(item => item !== parentObj);

                                if(parentObj.userData.type === 'freeform') {
                                    parentObj.children.forEach(child => {
                                        let worldPos = new THREE.Vector3();
                                        child.getWorldPosition(worldPos);
                                        scene.attach(child);
                                        child.userData = { isStatic: false, velocity: new THREE.Vector3((Math.random()-0.5)*2, Math.random()*2 + 1, (Math.random()-0.5)*2) };
                                        physicalObjects.push(child);
                                    });
                                    return;
                                }

                                const blockScale = 0.14;
                                const col = parentObj.material.color;
                                const clusterPos = parentObj.position;
                                const voxMat = new THREE.MeshStandardMaterial({ color: col, roughness: 0.4 });
                                const voxGeo = new THREE.BoxGeometry(blockScale, blockScale, blockScale);
                                
                                let generatedBlocks = [];
                                let boundLimit = 4;

                                for (let x = -boundLimit/2; x <= boundLimit/2; x++) {
                                    for (let y = -boundLimit/2; y <= boundLimit/2; y++) {
                                        for (let z = -boundLimit/2; z <= boundLimit/2; z++) {
                                            let instanceMesh = new THREE.Mesh(voxGeo, voxMat);
                                            instanceMesh.position.set(
                                                clusterPos.x + (x * blockScale * 1.1),
                                                clusterPos.y + (y * blockScale * 1.1),
                                                clusterPos.z + (z * blockScale * 1.1)
                                            );
                                            
                                            instanceMesh.userData = {
                                                isStatic: false,
                                                velocity: new THREE.Vector3((Math.random() - 0.5) * 3, Math.random() * 3 + 1, (Math.random() - 0.5) * 3),
                                                rotSpeed: new THREE.Vector3(Math.random() * 5, Math.random() * 5, 0)
                                            };

                                            scene.add(instanceMesh);
                                            physicalObjects.push(instanceMesh);
                                            generatedBlocks.push(instanceMesh);
                                        }
                                    }
                                }
                                objectHistory.push(generatedBlocks);
                            });
                        }
                    }
                });
            } else {
                // Clear active line drawing points if both hands leave viewport tracking boundaries
                handTrackingData.forEach((data, index) => {
                    if(data.isDrawing) { data.isDrawing = false; computeAndBuild3DShape(data.strokePoints); data.strokePoints = []; updateLiveLine(index); }
                });
            }

            // --- 6. Global Configuration Modifiers ---
            const now = Date.now();
            if (universalState.pinch && now - lastActionTime > 400) {
                colorIndex = (colorIndex + 1) % colors.length;
                let hexString = "#" + colors[colorIndex].toString(16).padStart(6, '0');
                colorBox.style.backgroundColor = hexString;
                lastActionTime = now;
            }
            if (universalState.undo && now - lastActionTime > 800) {
                if (objectHistory.length > 0) {
                    const group = objectHistory.pop();
                    group.forEach(el => {
                        scene.remove(el);
                        physicalObjects = physicalObjects.filter(item => item !== el);
                    });
                    statusText.innerText = "Object Array Recalled";
                }
                lastActionTime = now;
            }
        });

        window.addEventListener('resize', () => {
            camera3d.aspect = window.innerWidth / window.innerHeight;
            camera3d.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 7. Initialize Camera Array ---
        new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        }).start().then(() => statusText.innerText = "Dual Matrix Nodes Online");
    </script>
</body>
</html>
