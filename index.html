<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Tracker: Spatial Master Engine</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #020208; font-family: 'Courier New', Courier, monospace; }
        
        #camera-feed {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: 0; opacity: 0.3; transform: scaleX(-1);
        }
        
        #canvas3d { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        #ui-overlay {
            position: absolute; top: 20px; left: 20px; z-index: 2;
            background: rgba(0, 10, 25, 0.85); border: 1px solid #00f3ff;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4); color: #00f3ff; padding: 20px;
            border-radius: 6px; text-transform: uppercase; letter-spacing: 1px;
        }
        
        h3 { margin-top: 0; border-bottom: 1px solid #00f3ff; padding-bottom: 10px; font-size: 16px; }
        .instruction { font-size: 12px; margin: 8px 0; color: #a5f3fc; }
        .color-indicator { 
            display: inline-block; width: 14px; height: 14px; 
            border-radius: 50%; vertical-align: middle; box-shadow: 0 0 8px currentColor;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <video id="camera-feed" autoplay playsinline></video>
    <div id="canvas3d"></div>

    <div id="ui-overlay">
        <h3>Air Tracker Engine Matrix</h3>
        <div class="instruction">☝️ <b>Index Up:</b> Smooth 3D Draw</div>
        <div class="instruction">✊ <b>Fist:</b> Localized Spatial Eraser</div>
        <div class="instruction">🖐️ <b>Open Hand:</b> Convert Mesh to Voxels</div>
        <div class="instruction">🔄 <b>Both Hands Up ☝️:</b> Orbit Workspace View</div>
        <div class="instruction">↔️ <b>Both Hands Pinch 🤏:</b> Zoom In / Out</div>
        <div class="instruction">🤙 <b>Pinky Up:</b> Undo Last Matrix</div>
        <hr style="border-color: #00f3ff44;">
        <div class="instruction">Color Spec: <span id="color-box" class="color-indicator" style="background-color: #00f3ff;"></span></div>
        <div class="instruction">Telemetry: <span id="status-text" style="color: #fff;">Calibrating Vectors...</span></div>
    </div>

    <script>
        // --- 1. Signal Signal Smoothing Core ---
        class CoordinateSmoother {
            constructor(windowSize = 6) {
                this.windowSize = windowSize;
                this.buffer = [];
            }
            addAndSmooth(vector) {
                this.buffer.push(vector.clone());
                if (this.buffer.length > this.windowSize) this.buffer.shift();
                let smoothed = new THREE.Vector3(0, 0, 0);
                this.buffer.forEach(v => smoothed.add(v));
                return smoothed.divideScalar(this.buffer.length);
            }
            clear() { this.buffer = []; }
        }

        const smoothers = [new CoordinateSmoother(), new CoordinateSmoother()];

        // --- 2. Three.js Environment Initialization ---
        const container = document.getElementById('canvas3d');
        const scene = new THREE.Scene();
        
        const camera3d = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera3d.position.set(0, 0, 5);

        // Core visual containment group to manipulate rotations effortlessly
        const globalWorkspaceGroup = new THREE.Group();
        scene.add(globalWorkspaceGroup);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // --- 3. Physics & Geometry States ---
        let physicalObjects = [];
        let objectHistory = [];
        const colors = [0x00f3ff, 0xff0055, 0x00ff66, 0xffcc00, 0xb026ff, 0xffffff];
        let colorIndex = 0;
        let lastActionTime = 0;
        let initialZoomDistance = null;

        const statusText = document.getElementById('status-text');
        const colorBox = document.getElementById('color-box');

        let handTrackingData = [
            { isDrawing: false, strokePoints: [], liveLineMesh: null },
            { isDrawing: false, strokePoints: [], liveLineMesh: null }
        ];

        const handTrackers = [];
        const trackerGeo = new THREE.SphereGeometry(0.06, 16, 16);
        for(let i=0; i<10; i++) {
            const mesh = new THREE.Mesh(trackerGeo, new THREE.MeshBasicMaterial({ color: 0x00f3ff, wireframe: true }));
            mesh.visible = false;
            scene.add(mesh); // Sits outside workspace transformation matrices
            handTrackers.push(mesh);
        }

        function updateLiveLine(handIdx) {
            const data = handTrackingData[handIdx];
            if (data.liveLineMesh) globalWorkspaceGroup.remove(data.liveLineMesh);
            if (data.strokePoints.length < 2) return;

            const geometry = new THREE.BufferGeometry().setFromPoints(data.strokePoints);
            const material = new THREE.LineBasicMaterial({ color: colors[colorIndex], linewidth: 4 });
            data.liveLineMesh = new THREE.Line(geometry, material);
            globalWorkspaceGroup.add(data.liveLineMesh);
        }

        // --- 4. Predictive Geometry Solver ---
        function computeAndBuild3DShape(points) {
            if (points.length < 6) return;

            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity, minZ = Infinity, maxZ = -Infinity;
            points.forEach(p => {
                if(p.x < minX) minX = p.x; if(p.x > maxX) maxX = p.x;
                if(p.y < minY) minY = p.y; if(p.y > maxY) maxY = p.y;
                if(p.z < minZ) minZ = p.z; if(p.z > maxZ) maxZ = p.z;
            });

            const w = maxX - minX, h = maxY - minY, d = maxZ - minZ;
            const center = new THREE.Vector3(minX + w/2, minY + h/2, minZ + d/2);
            const start = points[0], end = points[points.length - 1];
            const isClosed = start.distanceTo(end) < (w + h) * 0.35;

            let geometry, mesh;
            const material = new THREE.MeshStandardMaterial({ color: colors[colorIndex], roughness: 0.2, metalness: 0.4 });
            let type = 'freeform';

            if (isClosed) {
                const aspect = w / h;
                if (aspect > 0.85 && aspect < 1.2 && d < (w+h)/3) {
                    // Circle path -> Torus Geometry (Donut)
                    geometry = new THREE.TorusGeometry((w+h)/4, 0.06, 12, 24);
                    type = 'torus';
                } else if (aspect > 0.75 && aspect < 1.3) {
                    geometry = new THREE.SphereGeometry((w+h)/4, 32, 32);
                    type = 'sphere';
                } else {
                    geometry = new THREE.BoxGeometry(w, h, Math.max(0.15, d));
                    type = 'box';
                }
            } else {
                if (w / h > 3.5 || h / w > 3.5) {
                    const length = start.distanceTo(end);
                    geometry = new THREE.CylinderGeometry(0.06, 0.06, length, 16);
                    type = 'cylinder';
                } else {
                    // Segment-linked complex path array
                    const group = new THREE.Group();
                    const subGeo = new THREE.SphereGeometry(0.06, 8, 8);
                    for(let i=0; i<points.length; i+=2) {
                        let m = new THREE.Mesh(subGeo, material.clone());
                        m.position.copy(points[i]);
                        group.add(m);
                    }
                    mesh = group;
                }
            }

            if (type !== 'freeform') {
                mesh = new THREE.Mesh(geometry, material);
                mesh.position.copy(center);
                if (type === 'cylinder') {
                    const dir = new THREE.Vector3().subVectors(end, start).normalize();
                    mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
                }
            }

            mesh.userData = { type, isStatic: true, velocity: new THREE.Vector3() };
            globalWorkspaceGroup.add(mesh);
            physicalObjects.push(mesh);
            objectHistory.push([mesh]);
        }

        // --- 5. Kinetic Simulation Frame Process ---
        const clock = new THREE.Clock();
        function animatePhysicsEngine() {
            requestAnimationFrame(animatePhysicsEngine);
            const dt = Math.min(0.03, clock.getDelta());
            
            for (let i = physicalObjects.length - 1; i >= 0; i--) {
                const obj = physicalObjects[i];
                if (obj.userData.isStatic) continue;

                obj.userData.velocity.y -= 9.8 * dt;
                obj.position.addScaledVector(obj.userData.velocity, dt);

                if(obj.userData.rotSpeed) {
                    obj.rotation.x += obj.userData.rotSpeed.x * dt;
                    obj.rotation.y += obj.userData.rotSpeed.y * dt;
                }

                // Dynamic Workspace Boundary Check (Virtual floor)
                if (obj.position.y < -2.2) {
                    obj.position.y = -2.2;
                    obj.userData.velocity.y *= -0.3;
                    obj.userData.velocity.x *= 0.85;
                    obj.userData.velocity.z *= 0.85;
                }
            }
            renderer.render(scene, camera3d);
        }
        animatePhysicsEngine();

        // --- 6. Intelligent Hand Processing Configuration Matrix ---
        const videoElement = document.getElementById('camera-feed');
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5, // Enhanced re-acquisition lock thresholds
            minTrackingConfidence: 0.8   // Highly constrained tracking accuracy stability
        });

        function checkFingerUp(lm, t, p) { return lm[t].y < lm[p].y; }
        function lerp(start, end, amt) { return (1 - amt) * start + amt * end; }

        hands.onResults((results) => {
            handTrackers.forEach(t => { t.visible = false; t.userData.isEraserMode = false; t.material.color.setHex(0x00f3ff); });
            let universalState = { pinchCount: 0, drawCount: 0, undo: false, pinchPositions: [] };

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const numHands = results.multiHandLandmarks.length;

                results.multiHandLandmarks.forEach((lm, handIdx) => {
                    if (handIdx >= 2) return;

                    const iUp = checkFingerUp(lm, 8, 6), mUp = checkFingerUp(lm, 12, 10), rUp = checkFingerUp(lm, 16, 14), pUp = checkFingerUp(lm, 20, 18);
                    const pinchDist = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);

                    const spatialZ = lerp(-1.2, -3.8, (lm[0].z + 0.1) * 5);
                    const rawX = (lm[8].x - 0.5) * -6.5;
                    const rawY = (0.5 - lm[8].y) * 4.5;

                    // Compute smooth points to nullify camera signal shaking values
                    let smoothedVector = smoothers[handIdx].addAndSmooth(new THREE.Vector3(rawX, rawY, spatialZ));

                    // Workspace tracking relative coordinates configuration
                    let localPoint = smoothedVector.clone();
                    globalWorkspaceGroup.worldToLocal(localPoint);

                    const isDraw = iUp && !mUp && !rUp && !pUp;
                    const isShatter = iUp && mUp && rUp && pUp;
                    const isEraser = !iUp && !mUp && !rUp && !pUp;
                    const isPinch = pinchDist < 0.045 && !mUp;

                    if (isPinch) { universalState.pinchCount++; universalState.pinchPositions.push(smoothedVector); }
                    if (isDraw) universalState.drawCount++;
                    if (pUp && !iUp && !mUp && !rUp) universalState.undo = true;

                    // Bind tracking nodes inside viewport context
                    [4, 8, 12, 16, 20].forEach((fId, fIdx) => {
                        let idx = (handIdx * 5) + fIdx;
                        if(idx < handTrackers.length) {
                            let node = handTrackers[idx];
                            node.position.set((lm[fId].x - 0.5) * -6.5, (0.5 - lm[fId].y) * 4.5, spatialZ);
                            node.visible = true;
                            if (isEraser) { node.userData.isEraserMode = true; node.material.color.setHex(0xff0055); }
                        }
                    });

                    // --- Process Transformations & View Manipulation Multi-Locks ---
                    if (numHands === 2 && universalState.drawCount === 2) {
                        statusText.innerText = "Global View Orbit Triggered";
                        // Use raw tracking metrics to scale rotational alignment updates dynamically
                        globalWorkspaceGroup.rotation.y += (rawX * 0.01);
                        globalWorkspaceGroup.rotation.x -= (rawY * 0.01);
                        return;
                    }

                    // Dual-Hand Distance Tracking Configuration for Scaling/Zooming
                    if (numHands === 2 && universalState.pinchCount === 2) {
                        statusText.innerText = "Global Workspace Zoom Triggered";
                        let currentDist = universalState.pinchPositions[0].distanceTo(universalState.pinchPositions[1]);
                        if (initialZoomDistance === null) {
                            initialZoomDistance = currentDist;
                        } else {
                            let zoomFactor = currentDist / initialZoomDistance;
                            camera3d.position.z = THREE.MathUtils.clamp(camera3d.position.z / (zoomFactor * 0.98), 2.0, 12.0);
                            initialZoomDistance = currentDist;
                        }
                        return;
                    } else {
                        initialZoomDistance = null; // Re-index standard configurations safely
                    }

                    // --- Processing Standalone Drawing Matrices ---
                    if (isDraw && universalState.drawCount === 1) {
                        let data = handTrackingData[handIdx];
                        if (!data.isDrawing) { data.isDrawing = true; data.strokePoints = []; }
                        data.strokePoints.push(localPoint);
                        statusText.innerText = `Hand [${handIdx + 1}] Processing Form Node`;
                        updateLiveLine(handIdx);
                    } else {
                        let data = handTrackingData[handIdx];
                        if (data.isDrawing) {
                            data.isDrawing = false;
                            computeAndBuild3DShape(data.strokePoints);
                            data.strokePoints = [];
                            updateLiveLine(handIdx);
                        }

                        if (isEraser) {
                            statusText.innerText = "Localized Vector Deletion Active";
                            // Map local coordinate conversion metrics cleanly before boundary tracking matching
                            let localEraseCenter = new THREE.Vector3((lm[9].x - 0.5) * -6.5, (0.5 - lm[9].y) * 4.5, spatialZ);
                            globalWorkspaceGroup.worldToLocal(localEraseCenter);

                            for (let k = physicalObjects.length - 1; k >= 0; k--) {
                                let obj = physicalObjects[k];
                                if (obj.position.distanceTo(localEraseCenter) < 0.5) {
                                    globalWorkspaceGroup.remove(obj);
                                    physicalObjects.splice(k, 1);
                                }
                            }
                        }
                        else if (isShatter) {
                            statusText.innerText = "Crumble Voxel Disruption Initialized";
                            let targets = physicalObjects.filter(obj => obj.userData.isStatic);

                            targets.forEach(parentObj => {
                                globalWorkspaceGroup.remove(parentObj);
                                physicalObjects = physicalObjects.filter(item => item !== parentObj);

                                const blockScale = 0.12;
                                const col = parentObj.material?.color || new THREE.Color(0x00f3ff);
                                const clusterPos = parentObj.position.clone();
                                const voxMat = new THREE.MeshStandardMaterial({ color: col, roughness: 0.4 });
                                const voxGeo = new THREE.BoxGeometry(blockScale, blockScale, blockScale);
                                
                                let generatedBlocks = [];
                                for (let x = -2; x <= 2; x++) {
                                    for (let y = -2; y <= 2; y++) {
                                        let instanceMesh = new THREE.Mesh(voxGeo, voxMat);
                                        instanceMesh.position.set(
                                            clusterPos.x + (x * blockScale * 1.1),
                                            clusterPos.y + (y * blockScale * 1.1),
                                            clusterPos.z
                                        );
                                        instanceMesh.userData = {
                                            isStatic: false,
                                            velocity: new THREE.Vector3((Math.random() - 0.5) * 3, Math.random() * 3 + 1, (Math.random() - 0.5) * 3),
                                            rotSpeed: new THREE.Vector3(Math.random() * 4, Math.random() * 4, 0)
                                        };
                                        globalWorkspaceGroup.add(instanceMesh);
                                        physicalObjects.push(instanceMesh);
                                        generatedBlocks.push(instanceMesh);
                                    }
                                }
                                objectHistory.push(generatedBlocks);
                            });
                        }
                    }
                });
            }

            // --- 7. Global Evaluation Events ---
            const now = Date.now();
            if (universalState.pinchCount === 1 && now - lastActionTime > 400) {
                colorIndex = (colorIndex + 1) % colors.length;
                let hexString = "#" + colors[colorIndex].toString(16).padStart(6, '0');
                colorBox.style.backgroundColor = hexString;
                lastActionTime = now;
            }
            if (universalState.undo && now - lastActionTime > 800) {
                if (objectHistory.length > 0) {
                    const group = objectHistory.pop();
                    group.forEach(el => {
                        globalWorkspaceGroup.remove(el);
                        physicalObjects = physicalObjects.filter(item => item !== el);
                    });
                    statusText.innerText = "Rolling Back Object State System";
                }
                lastActionTime = now;
            }
        });

        window.addEventListener('resize', () => {
            camera3d.aspect = window.innerWidth / window.innerHeight;
            camera3d.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        }).start().then(() => statusText.innerText = "Air Tracker Online");
    </script>
</body>
</html>
